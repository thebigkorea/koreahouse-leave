<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>한국의집 연월차관리</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#7b1e1e" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="brand">한국의집</div>
      <h1>연월차 신청</h1>
      <p>한국의집 롯데월드몰 직원용</p>
    </section>

    <section class="card">
      <label>매장</label>
      <select id="store">
        <option>한국의집 롯데월드몰</option>
      </select>

      <label>이름</label>
      <input id="name" placeholder="예: 홍길동" autocomplete="name" />

      <label>연락처</label>
      <input id="phone" placeholder="010-0000-0000" inputmode="tel" />

      <label>휴가 종류</label>
      <select id="leaveType">
        <option value="">선택하세요</option>
        <option>연차</option>
        <option>월차</option>
        <option>오전 반차</option>
        <option>오후 반차</option>
        <option>경조휴가</option>
        <option>병가</option>
      </select>

      <div class="grid2">
        <div>
          <label>시작일</label>
          <input id="startDate" type="date" />
        </div>
        <div>
          <label>종료일</label>
          <input id="endDate" type="date" />
        </div>
      </div>

      <label>사용일수</label>
      <input id="days" type="number" step="0.5" placeholder="예: 1 또는 0.5" />

      <label>사유</label>
      <textarea id="reason" placeholder="간단히 입력하세요"></textarea>

      <button class="primary" onclick="submitLeave()">신청하기</button>
      <button class="secondary" onclick="checkBalance()">잔여 연차 확인</button>

      <div id="result" class="result"></div>
    </section>

    <section class="card small">
      <h2>내 신청 내역</h2>
      <button class="secondary" onclick="loadMyRequests()">조회하기</button>
      <div id="myList" class="list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
